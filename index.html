<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillSplitter AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/09090b/ffffff?text=Bill">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Animasi Muncul ke Atas */
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.4s ease-out forwards;
        }

        /* Animasi Laser Scanner */
        @keyframes scan-laser {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-laser {
            animation: scan-laser 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Sudut-sudut bingkai ala kamera futuristik */
        .scan-bracket-tl { border-top: 2px solid #06b6d4; border-left: 2px solid #06b6d4; }
        .scan-bracket-tr { border-top: 2px solid #06b6d4; border-right: 2px solid #06b6d4; }
        .scan-bracket-bl { border-bottom: 2px solid #06b6d4; border-left: 2px solid #06b6d4; }
        .scan-bracket-br { border-bottom: 2px solid #06b6d4; border-right: 2px solid #06b6d4; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans antialiased selection:bg-indigo-500/30">

    <main class="max-w-md mx-auto p-4 pb-24 min-h-screen flex flex-col">
        
        <header class="text-center my-8">
            <div class="inline-flex items-center justify-center p-3 rounded-2xl bg-indigo-500/10 text-indigo-400 mb-3 border border-indigo-500/20">
                <i class="ph ph-receipt text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-cyan-400 to-indigo-400 bg-clip-text text-transparent">
                BillSplitter Pro
            </h1>
            <p class="text-xs text-zinc-400 mt-2 tracking-wide uppercase font-medium">Smart AI Bill Division</p>
        </header>

        <div class="space-y-5 flex-1">
            
            <section class="bg-zinc-900/50 backdrop-blur-xl border border-zinc-800/80 rounded-2xl p-5 shadow-2xl">
                <div class="flex items-center justify-between mb-4 border-b border-zinc-800 pb-3">
                    <div class="flex items-center gap-2">
                        <i class="ph ph-scan text-indigo-400 text-xl"></i>
                        <h2 class="text-sm tracking-wide font-bold uppercase text-zinc-300">Sistem OCR AI</h2>
                    </div>
                    <span id="ai-status-badge" class="text-[10px] uppercase tracking-wider font-bold bg-zinc-800 text-zinc-400 px-2 py-1 rounded-md border border-zinc-700">Ready</span>
                </div>
                
                <label id="upload-box" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-zinc-700 rounded-xl cursor-pointer hover:border-indigo-500 hover:bg-indigo-500/5 transition-all group">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                        <i class="ph ph-camera-plus text-3xl text-zinc-400 group-hover:text-indigo-400 transition-colors mb-2"></i>
                        <p class="text-sm font-semibold text-zinc-300">Ambil Foto Struk</p>
                        <p class="text-[10px] text-zinc-500 mt-1 uppercase tracking-wider">Mendukung Galeri & File</p>
                    </div>
                    <input id="camera-input" type="file" accept="image/*" class="hidden" />
                </label>

                <div id="scanner-box" class="hidden relative w-full h-48 bg-zinc-950 rounded-xl overflow-hidden border border-zinc-800">
                    <img id="image-preview" src="" class="absolute inset-0 w-full h-full object-contain opacity-40 mix-blend-luminosity" />
                    
                    <div class="absolute inset-2">
                        <div class="absolute top-0 left-0 w-6 h-6 scan-bracket-tl"></div>
                        <div class="absolute top-0 right-0 w-6 h-6 scan-bracket-tr"></div>
                        <div class="absolute bottom-0 left-0 w-6 h-6 scan-bracket-bl"></div>
                        <div class="absolute bottom-0 right-0 w-6 h-6 scan-bracket-br"></div>
                    </div>

                    <div id="laser-line" class="absolute left-0 right-0 h-0.5 bg-cyan-400 shadow-[0_0_12px_3px_rgba(6,182,212,0.8)] animate-laser z-10"></div>
                    
                    <div class="absolute bottom-3 left-3 right-3 flex items-center justify-between bg-zinc-900/90 backdrop-blur border border-zinc-700 rounded-lg px-3 py-2 z-20">
                        <div class="flex items-center gap-2">
                            <i class="ph ph-spinner animate-spin text-cyan-400"></i>
                            <span id="scan-status-text" class="text-xs text-cyan-400 font-mono tracking-tight">Menghubungkan core...</span>
                        </div>
                        <span id="scan-progress-text" class="text-xs font-bold text-white font-mono">0%</span>
                    </div>
                </div>

                <div class="mt-6 space-y-3">
                    <div>
                        <label class="text-[10px] text-zinc-400 block mb-1 uppercase tracking-wider font-semibold">Sub Total (Rp)</label>
                        <div class="relative">
                            <i class="ph ph-money absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 text-lg"></i>
                            <input id="sub-bill" type="number" placeholder="0" class="w-full bg-zinc-950/80 border border-zinc-800 rounded-xl pl-10 pr-4 py-3 text-xl font-bold text-indigo-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-zinc-400 block mb-1 uppercase tracking-wider font-semibold">Pajak (%)</label>
                            <input id="tax-input" type="number" placeholder="0" value="0" class="w-full bg-zinc-950/80 border border-zinc-800 rounded-xl px-4 py-2 text-sm font-semibold text-zinc-200 focus:outline-none focus:border-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] text-zinc-400 block mb-1 uppercase tracking-wider font-semibold">Layanan (%)</label>
                            <input id="service-input" type="number" placeholder="0" value="0" class="w-full bg-zinc-950/80 border border-zinc-800 rounded-xl px-4 py-2 text-sm font-semibold text-zinc-200 focus:outline-none focus:border-indigo-500 transition-all">
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-zinc-900/50 backdrop-blur-xl border border-zinc-800/80 rounded-2xl p-5 shadow-2xl">
                <div class="flex items-center gap-2 mb-4 border-b border-zinc-800 pb-3">
                    <i class="ph ph-users text-cyan-400 text-xl"></i>
                    <h2 class="text-sm tracking-wide font-bold uppercase text-zinc-300">Pembagian</h2>
                </div>

                <div class="flex gap-2 mb-4">
                    <div class="relative flex-1">
                        <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                        <input id="friend-name" type="text" placeholder="Nama anggota..." class="w-full bg-zinc-950/80 border border-zinc-800 rounded-xl pl-9 pr-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all">
                    </div>
                    <button id="add-friend-btn" class="bg-cyan-600/20 text-cyan-400 border border-cyan-500/30 hover:bg-cyan-600 hover:text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center active:scale-95">
                        <i class="ph ph-plus font-bold"></i>
                    </button>
                </div>

                <div id="friends-list" class="flex flex-wrap gap-2 min-h-[40px] items-center">
                    <span class="text-xs text-zinc-600">Daftar anggota akan muncul di sini.</span>
                </div>
            </section>

            <section id="result-section" class="hidden animate-fade-in-up bg-gradient-to-b from-indigo-950/40 to-zinc-900/80 backdrop-blur-xl border border-indigo-500/20 rounded-2xl p-5 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>

                <div class="flex items-center gap-2 mb-4 border-b border-indigo-500/20 pb-3 relative z-10">
                    <i class="ph ph-calculator text-indigo-400 text-xl"></i>
                    <h2 class="text-sm tracking-wide font-bold uppercase text-zinc-300">Rincian Akhir</h2>
                </div>

                <div class="bg-zinc-950/60 rounded-xl p-4 border border-zinc-800/50 space-y-3 relative z-10">
                    <div class="flex justify-between text-xs border-b border-zinc-800/50 pb-2">
                        <span class="text-zinc-400">Sub Total</span>
                        <span id="res-sub" class="font-medium text-zinc-200">Rp 0</span>
                    </div>
                    <div class="flex justify-between text-xs border-b border-zinc-800/50 pb-2">
                        <span class="text-zinc-400">Pajak & Layanan</span>
                        <span id="res-tax-service" class="font-medium text-zinc-200">Rp 0</span>
                    </div>
                    <div class="flex justify-between text-xs border-b border-zinc-800/50 pb-2">
                        <span class="text-zinc-400">Total Keseluruhan</span>
                        <span id="res-grand" class="font-bold text-indigo-400">Rp 0</span>
                    </div>
                    <div class="flex justify-between text-xs border-b border-zinc-800/50 pb-2">
                        <span class="text-zinc-400">Total Anggota</span>
                        <span id="res-count" class="font-medium text-zinc-200">0</span>
                    </div>
                    <div class="flex flex-col pt-2 border-t border-zinc-800/50 mt-2">
                        <span class="text-[10px] text-zinc-500 uppercase tracking-wider mb-1">Tanggungan Per Orang</span>
                        <span id="res-per-person" class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400 tracking-tight">Rp 0</span>
                    </div>
                </div>

                <button id="share-btn" class="w-full mt-5 bg-indigo-600 hover:bg-indigo-500 text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-indigo-900/50 relative z-10">
                    <i class="ph ph-share-network text-lg"></i>
                    Bagikan via WhatsApp
                </button>
            </section>

        </div>
    </main>

    <script>
        let friends = JSON.parse(localStorage.getItem('billFriends')) || [];
        let subBill = 0;
        let taxPercent = 0;
        let servicePercent = 0;

        const uploadBox = document.getElementById('upload-box');
        const scannerBox = document.getElementById('scanner-box');
        const cameraInput = document.getElementById('camera-input');
        const imagePreview = document.getElementById('image-preview');
        const laserLine = document.getElementById('laser-line');
        const scanStatusText = document.getElementById('scan-status-text');
        const scanProgressText = document.getElementById('scan-progress-text');
        const aiStatusBadge = document.getElementById('ai-status-badge');
        
        const subBillInput = document.getElementById('sub-bill');
        const taxInput = document.getElementById('tax-input');
        const serviceInput = document.getElementById('service-input');
        
        const friendNameInput = document.getElementById('friend-name');
        const addFriendBtn = document.getElementById('add-friend-btn');
        const friendsList = document.getElementById('friends-list');
        const resultSection = document.getElementById('result-section');
        const resSub = document.getElementById('res-sub');
        const resTaxService = document.getElementById('res-tax-service');
        const resGrand = document.getElementById('res-grand');
        const resCount = document.getElementById('res-count');
        const resPerPerson = document.getElementById('res-per-person');
        const shareBtn = document.getElementById('share-btn');

        if (friends.length > 0) renderFriends();

        function triggerHaptic() {
            if (navigator.vibrate) navigator.vibrate(15);
        }

        // SISTEM SINKRONISASI LOGGING BARU (PERBAIKAN MACET 0%)
        cameraInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            triggerHaptic();
            
            // Tampilkan panel animasi laser secara realtime
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                uploadBox.classList.add('hidden');
                scannerBox.classList.remove('hidden');
                laserLine.classList.add('animate-laser');
                laserLine.classList.remove('hidden');
            };
            reader.readAsDataURL(file);

            aiStatusBadge.innerText = 'PROCESSING...';
            aiStatusBadge.className = 'text-[10px] uppercase tracking-wider font-bold bg-indigo-500/20 text-indigo-400 px-2 py-1 rounded-md border border-indigo-500/50 animate-pulse';

            try {
                // Menggunakan modul global tingkat tinggi untuk performa caching optimal di Safari iOS
                const result = await Tesseract.recognize(file, 'eng', {
                    logger: m => {
                        // Sadap nilai dari seluruh fase daur hidup AI agar teks persen (%) langsung jalan berkelanjutan
                        const progress = Math.round(m.progress * 100);
                        scanProgressText.innerText = `${progress}%`;
                        
                        if (m.status === 'loading tesseract core') {
                            scanStatusText.innerText = 'Memuat modul inti...';
                        } else if (m.status === 'loading language traineddata') {
                            scanStatusText.innerText = 'Mengunduh paket bahasa...';
                        } else if (m.status === 'initializing api') {
                            scanStatusText.innerText = 'Menyelaraskan mesin AI...';
                        } else if (m.status === 'recognizing text') {
                            scanStatusText.innerText = 'Memindai angka struk...';
                        }
                    }
                });

                const text = result.data.text;
                
                // Ekstraksi pembersihan string nominal rupiah (menghapus titik/koma gangguan)
                const cleanText = text.replace(/[.,]/g, '');
                const numbers = cleanText.match(/\b\d{4,7}\b/g); 
                
                if (numbers && numbers.length > 0) {
                    const highestNumber = Math.max(...numbers.map(Number));
                    subBillInput.value = highestNumber;
                    subBill = highestNumber;
                    calculateSplit();
                    
                    scanStatusText.innerText = 'Berhasil diproses!';
                    scanProgressText.innerText = '100%';
                    aiStatusBadge.innerText = 'SUCCESS';
                    aiStatusBadge.className = 'text-[10px] uppercase tracking-wider font-bold bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded-md border border-emerald-500/50';
                } else {
                    throw new Error("Pola angka tidak ditemukan");
                }
            } catch (error) {
                console.error("Kesalahan sistem:", error);
                scanStatusText.innerText = 'Gagal membaca otomatis. Ketik manual.';
                aiStatusBadge.innerText = 'FAILED';
                aiStatusBadge.className = 'text-[10px] uppercase tracking-wider font-bold bg-rose-500/20 text-rose-400 px-2 py-1 rounded-md border border-rose-500/50';
            } finally {
                laserLine.classList.remove('animate-laser');
                laserLine.classList.add('hidden');
                
                // Jendela scanner otomatis berganti ke form input normal setelah 3 detik
                setTimeout(() => {
                    scannerBox.classList.add('hidden');
                    uploadBox.classList.remove('hidden');
                    aiStatusBadge.innerText = 'READY';
                    aiStatusBadge.className = 'text-[10px] uppercase tracking-wider font-bold bg-zinc-800 text-zinc-400 px-2 py-1 rounded-md border border-zinc-700';
                }, 3000);
            }
        });

        const updateCalculations = () => {
            subBill = Number(subBillInput.value) || 0;
            taxPercent = Number(taxInput.value) || 0;
            servicePercent = Number(serviceInput.value) || 0;
            calculateSplit();
        };

        subBillInput.addEventListener('input', updateCalculations);
        taxInput.addEventListener('input', updateCalculations);
        serviceInput.addEventListener('input', updateCalculations);

        addFriendBtn.addEventListener('click', () => {
            const name = friendNameInput.value.trim();
            if (!name) return;

            triggerHaptic();
            friends.push(name);
            localStorage.setItem('billFriends', JSON.stringify(friends)); 
            
            friendNameInput.value = '';
            renderFriends();
            calculateSplit();
        });

        friendNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addFriendBtn.click();
            }
        });

        function renderFriends() {
            if (friends.length === 0) {
                friendsList.innerHTML = '<span class="text-xs text-zinc-600">Daftar anggota akan muncul di sini.</span>';
                return;
            }
            friendsList.innerHTML = friends.map((name, index) => `
                <div class="bg-zinc-800 border border-zinc-700 px-3 py-1.5 rounded-lg text-xs flex items-center gap-2 font-medium text-zinc-300 shadow-sm transition hover:bg-zinc-700">
                    <i class="ph ph-user-circle text-zinc-400 text-sm"></i>
                    ${name}
                    <button onclick="removeFriend(${index})" class="text-zinc-500 hover:text-rose-400 ml-1 transition-colors flex items-center justify-center">
                        <i class="ph ph-x-circle text-base"></i>
                    </button>
                </div>
            `).join('');
        }

        window.removeFriend = function(index) {
            triggerHaptic();
            friends.splice(index, 1);
            localStorage.setItem('billFriends', JSON.stringify(friends));
            renderFriends();
            calculateSplit();
        };

        function calculateSplit() {
            if (subBill > 0 && friends.length > 0) {
                const taxAmount = subBill * (taxPercent / 100);
                const serviceAmount = subBill * (servicePercent / 100);
                const totalExtras = taxAmount + serviceAmount;
                const grandTotal = subBill + totalExtras;
                
                const perPerson = Math.round(grandTotal / friends.length);
                
                resSub.innerText = `Rp ${subBill.toLocaleString('id-ID')}`;
                resTaxService.innerText = `Rp ${totalExtras.toLocaleString('id-ID')}`;
                resGrand.innerText = `Rp ${grandTotal.toLocaleString('id-ID')}`;
                resCount.innerText = friends.length;
                resPerPerson.innerText = `Rp ${perPerson.toLocaleString('id-ID')}`;
                
                resultSection.classList.remove('hidden');
            } else {
                resultSection.classList.add('hidden');
            }
        }

        shareBtn.addEventListener('click', async () => {
            triggerHaptic();
            
            const taxAmount = subBill * (taxPercent / 100);
            const serviceAmount = subBill * (servicePercent / 100);
            const grandTotal = subBill + taxAmount + serviceAmount;
            const perPerson = Math.round(grandTotal / friends.length);
            
            const textShare = `*BILL SPLITTER PRO*\n\nSub Total: Rp ${subBill.toLocaleString('id-ID')}\nPajak & Layanan: Rp ${(taxAmount + serviceAmount).toLocaleString('id-ID')}\nTotal Akhir: Rp ${grandTotal.toLocaleString('id-ID')}\n\nDaftar Anggota (${friends.length}): ${friends.join(', ')}\n\n*TANGGUNGAN PER ORANG: Rp ${perPerson.toLocaleString('id-ID')}*`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Rincian Tagihan',
                        text: textShare
                    });
                } catch (err) {
                    console.log('Proses share dibatalkan.');
                }
            } else {
                navigator.clipboard.writeText(textShare);
                alert('Rincian berhasil disalin. Silakan tempel di aplikasi pesan.');
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
